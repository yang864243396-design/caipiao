  /admin/members/{memberNo}/ops:
    post:
      summary: 会员运营统一事件（改代理/重置密码/冻结解冻）
      tags: [admin-ops]
      security:
        - bearerAuth: []
      parameters:
        - name: memberNo
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [change_agent, reset_login_password, reset_fund_password, toggle_freeze]
                l1AgentCode:
                  type: string
                l2AgentCode:
                  type: string
      responses:
        '200':
          description: OK

  /admin/schemes/instances:
    get:
      summary: 全站方案监控 · 用户 Tab / 分享池 Tab
      description: scope=user 会员方案+实例；scope=share 分享池快照（仅自创）
      tags: [admin-ops]
      security:
        - bearerAuth: []
      parameters:
        - name: scope
          in: query
          required: true
          schema:
            type: string
            enum: [user, share]
        - name: keyword
          in: query
          schema:
            type: string
        - name: kind
          in: query
          schema:
            $ref: '#/components/schemas/SchemeKind'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SchemeInstanceStatus'
        - name: runMode
          in: query
          schema:
            type: string
            enum: [real, sim]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSchemeMonitorList'

  /admin/schemes/share/{snapshotId}:
    patch:
      summary: 分享池 · 修改快照完整配置
      tags: [admin-ops]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/snapshotId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchShareSnapshotRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseShareSnapshot'
    delete:
      summary: 分享池 · 删除快照
      tags: [admin-ops]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/snapshotId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseEmpty'

  /admin/schemes/instances/{instanceId}/force-stop:
    post:
      summary: 强停 → soft_stopped（已封停）
      tags: [admin-ops]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/instanceId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSchemeInstance'

  /admin/schemes/instances/{instanceId}/release-stop:
    post:
      summary: 解封 → paused（已暂停）
      tags: [admin-ops]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/instanceId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSchemeInstance'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    mode:
      name: mode
      in: query
      description: 真实记录 real / 模拟记录 sim
      schema:
        type: string
        enum: [real, sim]
        default: real
    days:
      name: days
      in: query
      description: 统计窗口（自然日），默认 3
      schema:
        type: integer
        minimum: 1
        maximum: 30
        default: 3
    cursor:
      name: cursor
      in: query
      schema:
        type: string
    limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    definitionId:
      name: definitionId
      in: path
      required: true
      schema:
        type: string
    instanceId:
      name: instanceId
      in: path
      required: true
      schema:
        type: string
    snapshotId:
      name: snapshotId
      in: path
      required: true
      schema:
        type: string

  responses:
    Unauthorized:
      description: 未登录或 Token 失效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponseError'

  schemas:
    ApiResponseHealth:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                status:
                  type: string
                  example: ok

    ApiResponseError:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              nullable: true

    ApiEnvelope:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          description: 0 成功，非 0 业务错误
          example: 0
        message:
          type: string
          example: ok
        data:
          nullable: true

    MoneySummary:
      type: object
      required: [totalBet, dayPnl, winRate]
      properties:
        totalBet:
          type: number
          format: double
          description: 总投注额（元）
          example: 235.0
        dayPnl:
          type: number
          format: double
          description: 当日盈亏（元）
          example: -27.5
        winRate:
          type: number
          format: double
          description: 胜率 0–100
          example: 62.5

    BetRecordSchemeGroup:
      type: object
      required: [schemeId, schemeName, totalBet, dayPnl, winRate]
      properties:
        schemeId:
          type: string
          example: sch-wan
        schemeName:
          type: string
          example: 禄螭万位计划
        totalBet:
          type: number
          format: double
        dayPnl:
          type: number
          format: double
        winRate:
          type: number
          format: double

    BetRecordItem:
      type: object
      required: [id, period, playType, multiplier, round, amount, pnl, status]
      properties:
        id:
          type: string
        period:
          type: string
          example: '20240310031'
        periods:
          type: string
          description: 第三方 web_bets/lott 接单返回的 periods
          example: '115202606160196'
        playType:
          type: string
          example: 万位定位
        multiplier:
          type: string
          example: '1.5'
        round:
          type: string
          example: 1/3
        amount:
          type: number
          format: double
          example: 10.0
        pnl:
          type: number
          format: double
          example: 5.0
        status:
          type: string
          enum: [hit, miss]

    PageMeta:
      type: object
      required: [hasMore]
      properties:
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    ApiResponseBetRecordGroups:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [mode, days, summary, groups]
              properties:
                mode:
                  type: string
                  enum: [real, sim]
                days:
                  type: integer
                dateFrom:
                  type: string
                  description: 统计区间起（UTC+8 自然日，含）
                  example: '2026-05-26'
                dateTo:
                  type: string
                  description: 统计区间止（UTC+8 自然日，含）
                  example: '2026-05-28'
                summary:
                  $ref: '#/components/schemas/MoneySummary'
                groups:
                  type: array
                  items:
                    $ref: '#/components/schemas/BetRecordSchemeGroup'

    ApiResponseBetRecordDetail:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [schemeId, schemeName, mode, days, summary, records]
              properties:
                schemeId:
                  type: string
                schemeName:
                  type: string
                mode:
                  type: string
                  enum: [real, sim]
                days:
                  type: integer
                dateFrom:
                  type: string
                  description: 统计区间起（UTC+8 自然日，含）
                dateTo:
                  type: string
                  description: 统计区间止（UTC+8 自然日，含）
                summary:
                  $ref: '#/components/schemas/MoneySummary'
                records:
                  type: object
                  required: [items, page]
                  properties:
                    items:
                      type: array
                      items:
                        $ref: '#/components/schemas/BetRecordItem'
                    page:
                      $ref: '#/components/schemas/PageMeta'

    CloudRunningScheme:
      type: object
      properties:
        id:
          type: string
        lotteryCode:
          type: string
        lotteryName:
          type: string
        schemeName:
          type: string
        status:
          type: string
          enum: [pending, running, paused, soft_stopped]
        statusLabel:
          type: string
        turnover:
          type: number
        countdownSec:
          type: integer
        countdownEndTime:
          type: string
          description: 第三方 periods 原始 end_time（UTC 墙钟）
        countdownCloseAt:
          type: string
          format: date-time
          description: RFC3339 封盘时刻（兼容旧客户端）
        pnl:
          type: number
        runTimeSec:
          type: integer
        lookbackPnl:
          type: number
        multiplier:
          type: number
        simBet:
          type: boolean

    CloudLookbackSettings:
      type: object
      properties:
        runModes:
          type: array
          items:
            type: string
            enum: [real, sim]
        judgment:
          type: string
          enum: [individual, overall]
        singleProfitThreshold:
          type: number
        singleLossThreshold:
          type: number
        overallProfitThreshold:
          type: number
        overallLossThreshold:
          type: number
        schemeWinsMin:
          type: number
        schemeWinsMax:
          type: number
        periodProfit:
          type: number
        periodLoss:
          type: number

    CloudCenterChannelStats:
      type: object
      properties:
        totalTurnover:
          type: number
          description: 该通道全部实例 turnover 之和
        totalSessionPnl:
          type: number
          description: 顶部「总盈亏」展示值；该通道全部实例 session_pnl（本次盈亏）之和
        runningSessionPnl:
          type: number
          description: 该通道 running 实例 session_pnl 之和

    CloudCenterStats:
      type: object
      properties:
        formal:
          $ref: '#/components/schemas/CloudCenterChannelStats'
        sim:
          $ref: '#/components/schemas/CloudCenterChannelStats'

    ApiResponseCloudCenterStats:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/CloudCenterStats'

    ApiResponseCloudRunningSchemes:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/SchemeInstance'

    ApiResponseCloudLookback:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/CloudLookbackSettings'

    ApiResponseEmpty:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              nullable: true

    LoginRequest:
      type: object
      required: [account, password]
      properties:
        account:
          type: string
        password:
          type: string
          format: password

    AuthTokenPayload:
      type: object
      required: [accessToken, expiresAt, account, displayName]
      properties:
        accessToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        account:
          type: string
        displayName:
          type: string
        roleId:
          type: string
          description: Admin 登录返回；绑定 admin_users.role_id

    AdminSessionPayload:
      type: object
      required: [account, displayName, roleId]
      properties:
        account:
          type: string
        displayName:
          type: string
        roleId:
          type: string

    ApiResponseAdminSession:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AdminSessionPayload'

    AdminUser:
      type: object
      required: [id, account, displayName, roleId, status]
      properties:
        id:
          type: integer
          format: int64
        account:
          type: string
        displayName:
          type: string
        roleId:
          type: string
        roleName:
          type: string
        status:
          type: string
          enum: [active, disabled]
        lastLoginAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AdminUserSaveInput:
      type: object
      required: [displayName, roleId, status]
      properties:
        account:
          type: string
          description: 创建时必填
        displayName:
          type: string
        roleId:
          type: string
        status:
          type: string
          enum: [active, disabled]
        password:
          type: string
          format: password
          description: 创建时必填；更新时留空则不修改

    ApiResponseAdminUser:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AdminUser'

    ApiResponseAdminUserList:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/AdminUser'

    AnnouncementListItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        date:
          type: string
        read:
          type: boolean

    AnnouncementDetail:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        date:
          type: string
        bodyHtml:
          type: string
        read:
          type: boolean

    FaqListItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string

    FaqDetail:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        bodyHtml:
          type: string

    HelpArticle:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        sort:
          type: integer
        bodyHtml:
          type: string

    FeedbackSubmitInput:
      type: object
      required: [subject, content]
      properties:
        subject:
          type: string
        content:
          type: string

    FeedbackResult:
      type: object
      properties:
        id:
          type: integer
          format: int64
        subject:
          type: string
        createdAt:
          type: string
          format: date-time

    ChatPeer:
      type: object
      properties:
        peerKey:
          type: string
        label:
          type: string
        kind:
          type: string
          enum: [service, superior, notice, group]
        unread:
          type: integer

    ChatHub:
      type: object
      properties:
        unreadItems:
          type: array
          items:
            $ref: '#/components/schemas/ChatPeer'
        superior:
          $ref: '#/components/schemas/ChatPeer'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/ChatPeer'

    ChatMessage:
      type: object
      properties:
        id:
          type: string
        direction:
          type: string
          enum: [in, out]
        body:
          type: string
        time:
          type: string

    ChatSendInput:
      type: object
      required: [body]
      properties:
        body:
          type: string

    AdminAnnouncement:
      type: object
      required: [title, status]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        publishedAt:
          type: string
          format: date-time
        bodyHtml:
          type: string

    AdminFaqCategory:
      type: object
      required: [name]
      properties:
        id:
          type: string
        name:
          type: string
        sort:
          type: integer

    AdminFaqArticle:
      type: object
      required: [categoryId, title]
      properties:
        id:
          type: string
        categoryId:
          type: string
        title:
          type: string
        sort:
          type: integer
        bodyHtml:
          type: string

    AdminHelpArticle:
      type: object
      required: [title]
      properties:
        id:
          type: string
        title:
          type: string
        sort:
          type: integer
        bodyHtml:
          type: string

    AdminLobbySlot:
      type: object
      required: [slotKey, title]
      properties:
        id:
          type: string
        slotKey:
          type: string
        title:
          type: string
        brief:
          type: string
        sort:
          type: integer
        enabled:
          type: boolean

    PublicLobbySlot:
      type: object
      properties:
        slotKey:
          type: string
        title:
          type: string
        brief:
          type: string
        sort:
          type: integer

    SiteBrand:
      type: object
      properties:
        siteName:
          type: string
        logoUrl:
          type: string
        tagline:
          type: string

    AdminMaintenanceState:
      type: object
      properties:
        enabled:
          type: boolean
        popupAnnouncementId:
          type: string
        title:
          type: string
        message:
          type: string

    AdminContentBundle:
      type: object
      properties:
        announcements:
          type: array
          items:
            $ref: '#/components/schemas/AdminAnnouncement'
        faqCategories:
          type: array
          items:
            $ref: '#/components/schemas/AdminFaqCategory'
        faqArticles:
          type: array
          items:
            $ref: '#/components/schemas/AdminFaqArticle'
        helpArticles:
          type: array
          items:
            $ref: '#/components/schemas/AdminHelpArticle'
        lobbySlots:
          type: array
          items:
            $ref: '#/components/schemas/AdminLobbySlot'
        siteBrand:
          $ref: '#/components/schemas/SiteBrand'

