          type: string
          example: 定位胆万位
        playTypeId:
          type: string
          enum: [dingwei, hou4, qian3, zhong3]
        subPlayId:
          type: string
          enum: [zhixuan_fs, zhixuan_ds, zuxuan_fs]
        groupContent:
          type: string
          description: 选号串；定位/池玩法逗号分隔，直选复式多行换行分隔，直选单式逗号分隔 N 位 token
          example: '1,3,7'

