      tags: [client-funds]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRechargeChannelList'

  /admin/funds/recharge-channels:
    get:
      summary: 充值渠道列表（含下架）
      tags: [admin-funds]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
