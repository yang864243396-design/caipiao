openapi: 3.0.3
info:
  title: 彩票平台 API
  version: 0.1.0
  description: |
    Client（/client/*）、Admin（/admin/*）、公共（/public/*）REST 契约。
    接入计划见 backend/docs/integration-plan.md
servers:
  - url: /api/v1
    description: 默认基址（与 VITE_API_BASE_URL 对齐）

tags:
  - name: public
    description: 无需登录
  - name: client-auth
    description: 会员/代理登录
  - name: client-cloud
    description: 云端中心
  - name: client-member
    description: 会员中心
  - name: client-funds
    description: 充值 / 提现 / 充提记录
  - name: client-orders
    description: 订单与帐变
  - name: client-copy-hall
    description: 跟单大厅
  - name: client-games
    description: 彩种游戏详情 / 开奖 / 手动下注
  - name: client-schemes
    description: 方案私池 / 分享池 / 云端实例
  - name: client-content
    description: 公告 / FAQ / 帮助 / 意见回馈
  - name: admin-auth
    description: 管理端登录
  - name: admin-ops
    description: 运营管理
  - name: admin-content
    description: 内容 CMS / 系统讯息
  - name: client-chat
    description: 聊天与系统讯息

paths:
  /health:
    get:
      summary: 健康检查
      tags: [public]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseHealth'

  /public/maintenance:
    get:
      summary: 全站维护状态（Client 大厅拦截）
      tags: [public]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMaintenance'

  /public/site-brand:
    get:
      summary: 站点品牌（只读）
      tags: [public]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSiteBrand'

  /public/lobby-slots:
    get:
      summary: 大厅运营位（只读 · 仅上架）
      tags: [public]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePublicLobbySlotList'

  /public/lotteries:
    get:
      summary: 彩种大厅列表（sale_status=on_sale）
      tags: [public]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePublicLotteryList'

  /public/lotteries/{code}/play-tree:
    get:
      summary: 彩种玩法树（两层 · 仅上架）
      tags: [public]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePublicPlayTree'
        '403':
          description: 彩种维护中
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '404':
          $ref: '#/components/responses/NotFound'

  /public/lotteries/{code}/status:
    get:
      summary: 彩种路由状态（旧码/无效码/维护 · 供 Client 路由守卫）
      tags: [public]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLotteryRouteStatus'

  /admin/games/lottery-catalog:
    get:
      summary: 彩种目录（含维护态 · Admin 全量）
      tags: [admin-system]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLotteryCatalogList'

  /admin/games/lottery-catalog/{code}:
    patch:
      summary: 彩种维护 PATCH（P5 · 上架→维护 / 维护改 4 字段）
      description: |
        上架态仅允许 `enterMaintenance: true` 进入维护。
        维护态可改 `displayName`、`outboundLotteryCode`、`sortOrder`、`saleStatus`（上架↔维护）；
        改中文名会同步该彩种下用户方案的 `lottery_label`。
      tags: [admin-system]
      security:
        - bearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchLotteryCatalogRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLotteryCatalogRow'
        '403':
          description: 上架态不可直接编辑
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/games/play-templates:
    get:
      summary: 玩法模板列表（只读）
      tags: [admin-system]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK

  /admin/games/play-templates/{templateCode}/play-tree:
    get:
      summary: 玩法树（只读 · 按模板）
      tags: [admin-system]
      security:
        - bearerAuth: []
      parameters:
        - name: templateCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  /client/auth/login:
    post:
      summary: 会员/代理登录
      tags: [client-auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAuthToken'

  /client/member/profile:
    get:
      summary: 当前会员资料与余额摘要
      tags: [client-member]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMemberProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /client/member/wallet:
    get:
      summary: 当前会员钱包（可用/冻结余额）
      tags: [client-member]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMemberWallet'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /client/funds/records:
    get:
      summary: 充提记录 · 充值与提现订单合并列表
      description: 只读；充值下单见 POST /client/funds/recharge（内测演示即时到账）
      tags: [client-funds]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseFundRecords'

  # ===== 第三方挂机授权（Guaji · T1/T1b/T6） =====
  /client/guaji/auth-status:
    get:
      summary: 当前会员第三方授权门禁状态（hasActiveGuajiAuth / bindingCount / activeUsername）
      tags: [client-guaji]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /client/guaji/accounts:
    get:
      summary: 第三方授权账号列表（绑定列表）
      tags: [client-guaji]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /client/guaji/accounts/bind:
    post:
      summary: 绑定第三方授权账号（用户名+密码；可能返回 mfaRequired）
      tags: [client-guaji]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
                loginKey: { type: string }
                googleCode: { type: string }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }

  /client/guaji/accounts/{id}/activate:
    post:
      summary: 设为启用（切换主授权，内含全部 running/pending 方案批量暂停）
      tags: [client-guaji]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }

  /client/guaji/accounts/{id}/reauth:
    post:
      summary: 重新授权（全自动 MFA 刷新 Token；连续失败 3 次引导绑定页）
      tags: [client-guaji]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }

  /client/guaji/accounts/{id}:
    delete:
      summary: 解绑授权账号（内含全部 running/pending 方案批量暂停）
      tags: [client-guaji]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }

  /client/guaji/balance:
    get:
      summary: 当前启用授权的主币种实账余额（取自第三方 users/i/info）
      tags: [client-guaji]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }

  /client/guaji/primary-currency:
    get:
      summary: 查询会员主币种（USDT/TRX/CNY）
      tags: [client-guaji]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }
    put:
      summary: 切换主币种（内含全部 running/pending 方案批量暂停）
      tags: [client-guaji]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currency: { type: string, enum: [USDT, TRX, CNY] }
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }

  /admin/members/{memberNo}/guaji-accounts:
    get:
      summary: Admin 会员详情 · 第三方授权只读列表（§19.5）
      tags: [admin-guaji]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: memberNo, in: path, required: true, schema: { type: string } }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }

  /admin/guaji/health:
    get:
      summary: Admin · 第三方授权健康指标（totalBindings/activeAccounts/erroredTokens/expiringSoon）
      tags: [admin-guaji]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK, content: { application/json: { schema: { type: object } } } }

  /client/orders/ledger:
    get:
      summary: 会员 · 帐变记录
      description: 对应 Client `MemberLedgerView`；默认查询当日（UTC+8）
      tags: [client-orders]
      security:
        - bearerAuth: []
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: type
          in: query
          schema:
            type: string
            enum: [all, deposit, withdraw, bet, payout, adjust, withdraw_freeze]
        - name: orderNo
          in: query
          schema:
            type: string
        - name: scope
          in: query
          schema:
            type: string
            enum: [self, team]
            default: self
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWalletLedger'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /client/cloud/bet-records:
    get:
      summary: 云端 · 最近 N 日投注记录（按方案分组）
      description: |
        对应 Client `BetRecordsView`。
        Tab「真实/模拟」通过 mode 区分；汇总栏用 summary；列表用 groups。
      tags: [client-cloud]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/mode'
        - $ref: '#/components/parameters/days'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBetRecordGroups'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /client/cloud/bet-records/{schemeId}:
    get:
      summary: 云端 · 单方案投注明细
      description: 对应 Client `BetRecordsSchemeDetailView` 表格
      tags: [client-cloud]
      security:
        - bearerAuth: []
      parameters:
        - name: schemeId
          in: path
          required: true
          schema:
            type: string
          example: cloud_demo_2001
        - $ref: '#/components/parameters/mode'
        - $ref: '#/components/parameters/days'
        - $ref: '#/components/parameters/cursor'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBetRecordDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /client/cloud/schemes/running:
    get:
      summary: 云端 · 运行中方案列表
      tags: [client-cloud]
      security:
        - bearerAuth: []
      parameters:
        - name: runMode
          in: query
          required: false
          description: 分路筛选；不传返回全部
          schema:
            type: string
            enum: [real, sim]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCloudRunningSchemes'

  /client/cloud/schemes/stats:
    get:
      summary: 云端 · 中心顶部统计（正式/模拟各 3 项）
      tags: [client-cloud]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCloudCenterStats'

  /client/cloud/lookback:
    get:
      summary: 云端 · 回头设置
      tags: [client-cloud]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCloudLookback'
    put:
      summary: 云端 · 保存回头设置
      tags: [client-cloud]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudLookbackSettings'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCloudLookback'

  /client/cloud/schemes/{schemeId}/start:
    post:
      summary: 云端 · 开启方案（兼容旧路径，等同 instances/{id}/start）
      deprecated: true
      tags: [client-cloud]
      security:
        - bearerAuth: []
      parameters:
        - name: schemeId
          in: path
          required: true
          description: 实为 instanceId
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSchemeInstance'

  /client/orders/bets:
    get:
      summary: 会员 · 投注记录查询（全站）
      description: 对应 `member-bet-records`，筛选维度多于云端三日记录
      tags: [client-orders]
      security:
        - bearerAuth: []
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: gameCode
          in: query
          schema:
            type: string
        - name: orderNo
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [all, pending, win, lose, cancel]
        - name: scope
          in: query
          schema:
            type: string
            enum: [self, team]
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMemberBetList'

  /client/copy-hall/rankings:
    get:
      summary: 跟单大厅 · 榜单
      tags: [client-copy-hall]
      security:
        - bearerAuth: []
      parameters:
        - name: lotteryCode
          in: query
          required: true
          schema:
            type: string
        - name: board
          in: query
          required: true
          schema:
            type: string
            enum: [master, contrary]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseCopyHallRankings'

  /client/games/lottery-options:
    get:
      summary: 会员投注记录 · 彩种筛选项（含维护态，标注维护）
      tags: [client-games]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMemberLotteryFilterOptions'

  /client/games/{code}/detail:
    get:
      summary: 彩种 · 游戏详情（倒计时 / 走势 / 投注明细）
      tags: [client-games]
      security:
        - bearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: tron_ffc_1m
        - name: schemeName
          in: query
          schema:
            type: string
          description: 方案名（跟单大厅跳转时传）
        - name: playMethod
          in: query
          schema:
            type: string
          description: 玩法中文名，如「定位胆万位」
        - name: playTypeId
          in: query
          schema:
            type: string
            enum: [dingwei, hou4, qian3, zhong3]
          description: 跟单大厅跳转时传；Client 路由 query，优先于 playMethod 解析
        - name: subPlayId
          in: query
          schema:
            type: string
            enum: [zhixuan_fs, zhixuan_ds, zuxuan_fs]
          description: 子玩法 ID；与 playTypeId 一并传递
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGameDetail'
        '403':
          description: 彩种维护中
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'

  /client/games/{code}/draws:
    get:
      summary: 彩种 · 历史开奖
      tags: [client-games]
      security:
        - bearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseGameDraws'

  /client/games/{code}/bets:
    post:
      summary: 彩种 · 手动下注（真实选号 + 扣钱包）
      description: |
        请求体须含 `betPayload.groupContent`（客户端选号）；后端校验玩法段后持久化至 `bet_orders.bet_payload`。
        余额不足返回 code=403「可用余额不足」；选号无效返回 422。
      tags: [client-games]
      security:
        - bearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceGameBetRequest'
      responses:
        '200':
          description: OK（订单 pending，待 settlement worker 开奖结算）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePlaceGameBet'
        '403':
          description: 彩种维护中 / 余额不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '422':
          description: 选号无效 / 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'

  /client/games/{code}/scheme-options:
    get:
      summary: 彩种 · 方案选项（运行/玩法/子玩法）
      description: 首期读种子配置；见 schemes.md D21
      tags: [client-schemes]
      security:
        - bearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          example: tencent_ffc
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLotterySchemeOptions'

  /client/schemes:
    get:
      summary: 私池 · 我的方案列表
      tags: [client-schemes]
      security:
        - bearerAuth: []
      parameters:
        - name: kind
          in: query
          schema:
