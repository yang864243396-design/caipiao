  /client/chat/system-messages:
    get:
      summary: 会员系统讯息列表
      tags: [client-chat]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSystemMessageList'

  /client/funds/recharge:
    post:
      summary: 充值下单（内测演示 · 即时到账）
      description: |
        无第三方支付回调；校验渠道与限额后立即写入 `recharge_orders`（status=paid）、
        增加钱包余额并写 `wallet_ledger`（txn_type=deposit）。生产环境应替换为真实支付流程。
      tags: [client-funds]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RechargeSubmitInput'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRechargeSubmit'

  /client/funds/recharge-channels:
    get:
